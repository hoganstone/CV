    width:100%; border:1px solid #cbd5e1; border-radius:6px; padding:8px 12px;

  label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:4px; }

  .btn-primary { background:#3b82f6; color:white; }
  .btn-primary:hover { background:#2563eb; }
  .btn-danger { background:#ef4444; color:white; }
  .btn-danger:hover { background:#dc2626; }
  .btn-ghost { background:#f1f5f9; color:#374151; border:1px solid #e2e8f0; }

<script>
// ─── Auth ──────────────────────────────────────────────────────────────────
const DEFAULT_PW = 'hogan2026';
function getPassword() { return localStorage.getItem('cv_admin_pw') || DEFAULT_PW; }

function doLogin() {
  const pw = document.getElementById('login-pw').value;
  if (pw === getPassword()) {
    localStorage.setItem('cv_admin_session', '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-app').classList.remove('hidden');
    initAdmin();
  } else {
    document.getElementById('login-err').classList.remove('hidden');
  }
}

function doLogout() {
  localStorage.removeItem('cv_admin_session');
  location.reload();
}

function changePassword() {
  const cur = document.getElementById('pw-current').value;
  const nw = document.getElementById('pw-new').value;
  const con = document.getElementById('pw-confirm').value;
  if (cur !== getPassword()) return showToast('目前密碼錯誤', true);
  if (nw.length < 6) return showToast('新密碼至少需要 6 個字元', true);
  if (nw !== con) return showToast('確認密碼不一致', true);
  localStorage.setItem('cv_admin_pw', nw);
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  showToast('密碼已變更');
}

let cvData = {};

function loadCvData() {
  try {
    const saved = localStorage.getItem('hogan_cv_data');
    if (saved) {
      cvData = JSON.parse(saved);
      if (!cvData.i18nZh) cvData.i18nZh = JSON.parse(JSON.stringify(defaultData.i18nZh));
      migrateProjects();
    } else {
      cvData = JSON.parse(JSON.stringify(defaultData));
    }
  } catch(e) {
    cvData = JSON.parse(JSON.stringify(defaultData));
  }
}

function migrateProjects() {
  if (!cvData.projects) { cvData.projects = JSON.parse(JSON.stringify(defaultData.projects)); return; }
  // Add missing default projects and fill missing account/password fields
  defaultData.projects.forEach(dp => {
    const existing = cvData.projects.find(p => p.id === dp.id);
    if (!existing) {
      cvData.projects.unshift(JSON.parse(JSON.stringify(dp)));
    } else {
      if (!existing.account && dp.account) existing.account = dp.account;
      if (!existing.password && dp.password) existing.password = dp.password;
    }
  });
  // Sort projects to match defaultData order, extra saved projects go at end
  const defaultOrder = defaultData.projects.map(p => p.id);
  cvData.projects.sort((a, b) => {
    const ai = defaultOrder.indexOf(a.id), bi = defaultOrder.indexOf(b.id);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}

function saveCvData() {
  localStorage.setItem('hogan_cv_data', JSON.stringify(cvData));
}

}

  [cvData.skills[idx], cvData.skills[newIdx]] = [cvData.skills[newIdx], cvData.skills[idx]];
  renderSkillsList();

function addTag(skillId) {
  const input = document.getElementById('sk-tag-input');
  const val = input.value.trim();
  if (!val) return;
  const s = cvData.skills.find(x => x.id === skillId);
  if (s && !s.tags.includes(val)) {
    s.tags.push(val);
    const container = document.getElementById('sk-tags-container');
    container.innerHTML += `<span class="tag-pill">${val}<button onclick="removeTag(this,'${skillId}')">✕</button></span>`;
  }
  input.value = '';
}

function removeTag(btn, skillId) {
  const pill = btn.parentElement;
  const tagText = pill.textContent.replace('✕','').trim();
  const s = cvData.skills.find(x => x.id === skillId);
  if (s) s.tags = s.tags.filter(t => t !== tagText);
  pill.remove();
}

function saveSkillModal(id) {
  const s = cvData.skills.find(x => x.id === id);
  if (!s) return;
  s.title = document.getElementById('sk-title').value;
  s.icon = document.getElementById('sk-icon').value;
  s.colorTheme = document.getElementById('sk-color').value;
  s.span = parseInt(document.getElementById('sk-span').value) || 1;
  saveCvData();
  closeModal();
  renderSkillsList();
  showToast('✓ 已儲存');
}

  document.getElementById('modal-content').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-slate-800">編輯專案</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div class="field-group"><label>標題（可用 &lt;br&gt; 換行）</label><input type="text" id="pj-title" value="${p.title}"></div>
    <div class="field-group">
      <label>封面圖片</label>
      <div class="flex gap-2 items-center mb-2">
        <input type="text" id="pj-image" value="${p.image||''}" placeholder="貼上圖片網址（https://...）" style="flex:1" oninput="previewPjImage()">
        <label class="btn btn-ghost text-sm flex-shrink-0" style="cursor:pointer;padding:8px 14px;">
          上傳圖片
          <input type="file" accept="image/*" onchange="uploadPjImage(this)" style="display:none">
        </label>
      </div>
      <div id="pj-image-preview" class="rounded-lg overflow-hidden" style="height:${p.image?'120px':'0'};transition:height 0.2s;">
        ${p.image?`<img src="${p.image}" style="width:100%;height:120px;object-fit:cover;">`:''}
      </div>
      <p class="text-xs text-slate-400 mt-1">未設定圖片時使用漸層色背景</p>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="field-group"><label>漸層色備用背景</label>
        <select id="pj-gradient">${gradientOptions.map(g=>`<option value="${g}" ${g===p.gradient?'selected':''}>${g}</option>`).join('')}</select>
      </div>
      <div class="field-group"><label>圖示 class</label>
        <input type="text" id="pj-icon" value="${p.icon}" list="icon-list2">
        <datalist id="icon-list2">${iconOptions.map(o=>`<option value="${o}">`).join('')}</datalist>
      </div>
    </div>
    <div class="field-group"><label>描述</label><textarea id="pj-desc" rows="3">${p.description||''}</textarea></div>
    <div class="grid grid-cols-2 gap-4">
      <div class="field-group"><label>Demo 帳號</label><input type="text" id="pj-account" value="${p.account||''}" placeholder="登入帳號"></div>
      <div class="field-group"><label>Demo 密碼</label><input type="text" id="pj-password" value="${p.password||''}" placeholder="登入密碼"></div>
    </div>
    <div class="field-group">
      <label>技術標籤</label>
      <div id="pj-tags-container" class="flex flex-wrap gap-1 mb-2">
        ${(p.techTags||[]).map(t=>`<span class="tag-pill">${t.text}(${t.color})<button onclick="removePjTag(this,'${id}','${t.text}')">✕</button></span>`).join('')}
      </div>
      <div class="flex gap-2">
        <input type="text" id="pj-tag-text" placeholder="標籤文字" style="flex:2">
        <select id="pj-tag-color" style="flex:1">${techTagColors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
        <button class="btn btn-ghost" style="white-space:nowrap" onclick="addPjTag('${id}')">+ 新增</button>
      </div>
    </div>
    <div class="field-group">
      <label>連結按鈕</label>
      <div id="pj-links-container">${(p.links||[]).map(l=>renderLinkRow(id,l.lid,l)).join('')}</div>
      <button class="btn btn-ghost text-sm mt-2" onclick="addLink('${id}')">+ 新增連結</button>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProjectModal('${id}')">儲存</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

function renderLinkRow(projId, lid, l) {
  return `<div class="flex gap-2 mb-2 items-center" id="link-row-${lid}">
    <input type="text" placeholder="按鈕文字" value="${l.text||''}" id="link-text-${lid}" style="flex:2">
    <input type="url" placeholder="URL" value="${l.url||''}" id="link-url-${lid}" style="flex:3">
    <select id="link-style-${lid}" style="flex:1">
      ${['light','primary','outline'].map(s=>`<option value="${s}" ${s===l.style?'selected':''}>${s}</option>`).join('')}
    </select>
    <label style="display:flex;align-items:center;gap:4px;font-weight:400;white-space:nowrap;font-size:12px;">
      <input type="checkbox" id="link-full-${lid}" ${l.fullWidth?'checked':''}> 全寬
    </label>
    <button class="btn btn-danger text-xs" onclick="removeLinkRow('${projId}','${lid}')">✕</button>
  </div>`;
}

function addLink(projId) {
  const p = cvData.projects.find(x => x.id === projId);
  if (!p) return;
  const lid = uid();
  const newLink = { lid, text:'', url:'', style:'light', fullWidth:false };
  p.links.push(newLink);
  document.getElementById('pj-links-container').insertAdjacentHTML('beforeend', renderLinkRow(projId, lid, newLink));
}

function removeLinkRow(projId, lid) {
  const row = document.getElementById(`link-row-${lid}`);
  if (row) row.remove();
  const p = cvData.projects.find(x => x.id === projId);
  if (p) p.links = p.links.filter(l => l.lid !== lid);
}

function uploadPjImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('pj-image').value = e.target.result;
    previewPjImage();
  };
  reader.readAsDataURL(file);
}

function previewPjImage() {
  const src = document.getElementById('pj-image').value.trim();
  const wrap = document.getElementById('pj-image-preview');
  if (src) {
    wrap.style.height = '120px';
    wrap.innerHTML = `<img src="${src}" style="width:100%;height:120px;object-fit:cover;" onerror="this.parentElement.style.height='0'">`;
  } else {
    wrap.style.height = '0';
    wrap.innerHTML = '';
  }
}

function addPjTag(projId) {
  const text = document.getElementById('pj-tag-text').value.trim();
  const color = document.getElementById('pj-tag-color').value;
  if (!text) return;
  const p = cvData.projects.find(x => x.id === projId);
  if (!p.techTags) p.techTags = [];
  p.techTags.push({ text, color });
  document.getElementById('pj-tags-container').innerHTML += `<span class="tag-pill">${text}(${color})<button onclick="removePjTag(this,'${projId}','${text}')">✕</button></span>`;
  document.getElementById('pj-tag-text').value = '';
}

function removePjTag(btn, projId, tagText) {
  btn.parentElement.remove();
  const p = cvData.projects.find(x => x.id === projId);
  if (p) p.techTags = p.techTags.filter(t => t.text !== tagText);
}

function saveProjectModal(id) {
  const p = cvData.projects.find(x => x.id === id);
  if (!p) return;
  p.title = document.getElementById('pj-title').value;
  p.image = document.getElementById('pj-image').value.trim();
  p.gradient = document.getElementById('pj-gradient').value;
  p.icon = document.getElementById('pj-icon').value;
  p.description = document.getElementById('pj-desc').value;
  p.account = document.getElementById('pj-account').value.trim();
  p.password = document.getElementById('pj-password').value.trim();
  // Collect links (use lid as stable key, not array index)
  p.links = p.links.map(l => {
    const lid = l.lid;
    const textEl = document.getElementById(`link-text-${lid}`);
    if (!textEl) return null;
    return {
      lid,
      text: textEl.value,
      url: document.getElementById(`link-url-${lid}`).value,
      style: document.getElementById(`link-style-${lid}`).value,
      fullWidth: document.getElementById(`link-full-${lid}`).checked
    };
  }).filter(Boolean);
  saveCvData();
  closeModal();
  renderProjectsList();
  showToast('✓ 已儲存');
}

function collectProjects() { return cvData.projects; }

// ─── Experience ────────────────────────────────────────────────────────────
function loadExperiencePanel() { renderExperienceList(); }

function renderExperienceList() {
  const container = document.getElementById('experience-list');
  if (!cvData.experience || !cvData.experience.length) {
    container.innerHTML = '<p class="text-slate-400 text-center py-8">尚無工作經歷</p>';
    return;
  }
  container.innerHTML = cvData.experience.map((e,i) => `
    <div class="card">
      <div class="flex items-center justify-between">
        <div>
          <div class="font-bold text-slate-800">${e.title} <span class="text-sm font-normal text-slate-500">@ ${e.company||'(多家公司)'}</span></div>
          <div class="text-xs text-slate-400">${e.period} | 類型: ${e.contentType} | 位置: ${e.side}</div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-ghost text-sm" onclick="moveExp('${e.id}',-1)" ${i===0?'disabled':''}>↑</button>
          <button class="btn btn-ghost text-sm" onclick="moveExp('${e.id}',1)" ${i===cvData.experience.length-1?'disabled':''}>↓</button>
          <button class="btn btn-ghost text-sm" onclick="openExpModal('${e.id}')">編輯</button>
          <button class="btn btn-danger text-sm" onclick="deleteExp('${e.id}')">刪除</button>
        </div>
      </div>
    </div>`).join('');
}

function addExperience() {
  const ne = { id:uid(), period:'', yearsNote:'', title:'新職位', company:'', contentType:'text', side:'right', dotColor:'bg-slate-300', content:'' };
  cvData.experience.push(ne);
  renderExperienceList();
  openExpModal(ne.id);
}

function deleteExp(id) {
  if (!confirm('確定刪除此工作經歷？')) return;
  cvData.experience = cvData.experience.filter(e => e.id !== id);
  renderExperienceList();
}

function moveExp(id, dir) {
  const idx = cvData.experience.findIndex(e => e.id === id);
  if (idx < 0) return;
  const ni = idx + dir;
  if (ni < 0 || ni >= cvData.experience.length) return;
  [cvData.experience[idx], cvData.experience[ni]] = [cvData.experience[ni], cvData.experience[idx]];
  renderExperienceList();
}

function openExpModal(id) {
  const e = cvData.experience.find(x => x.id === id);
  if (!e) return;
  const isArray = Array.isArray(e.content);
  const contentVal = isArray ? e.content.join('\n') : (e.content || '');
  document.getElementById('modal-content').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-slate-800">編輯工作經歷</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="field-group"><label>期間</label><input type="text" id="ex-period" value="${e.period||''}"></div>
      <div class="field-group"><label>年資備註</label><input type="text" id="ex-yearsNote" value="${e.yearsNote||''}"></div>
    </div>
    <div class="field-group"><label>職稱</label><input type="text" id="ex-title" value="${e.title||''}"></div>
    <div class="field-group"><label>公司名稱</label><input type="text" id="ex-company" value="${e.company||''}"></div>
    <div class="grid grid-cols-3 gap-4">
      <div class="field-group"><label>內容類型</label>
        <select id="ex-type" onchange="toggleExpContent()">
          <option value="text" ${e.contentType==='text'?'selected':''}>純文字</option>
          <option value="list" ${e.contentType==='list'?'selected':''}>條列清單</option>
          <option value="companies" ${e.contentType==='companies'?'selected':''}>多公司</option>
        </select>
      </div>
      <div class="field-group"><label>時間軸位置</label>
        <select id="ex-side">
          <option value="right" ${e.side==='right'?'selected':''}>右側（日期在左）</option>
          <option value="left" ${e.side==='left'?'selected':''}>左側（日期在右）</option>
        </select>
      </div>
      <div class="field-group"><label>圓點顏色</label>
        <select id="ex-dot">
          <option value="bg-secondary" ${e.dotColor==='bg-secondary'?'selected':''}>藍色</option>
          <option value="bg-slate-300" ${e.dotColor==='bg-slate-300'?'selected':''}>灰色</option>
        </select>
      </div>
    </div>
    <div class="field-group" id="ex-content-wrap">
      <label id="ex-content-label">內容（條列類型每行一項，可使用 HTML）</label>
      <textarea id="ex-content" rows="6">${contentVal}</textarea>
      <p id="ex-content-hint" class="text-xs text-slate-400 mt-1"></p>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveExpModal('${id}')">儲存</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
  toggleExpContent();
}

function toggleExpContent() {
  const type = document.getElementById('ex-type').value;
  const hint = document.getElementById('ex-content-hint');
  if (type === 'text') {
    hint.textContent = '直接輸入描述文字。';
  } else if (type === 'list') {
    hint.textContent = '每行為一個清單項目，可使用 HTML（如 <span class="...">粗體：</span>文字）。';
  } else {
    hint.textContent = '每行代表一家公司，可使用 HTML（如 <span class="font-semibold">公司名：</span>說明）。';
  }
}

function saveExpModal(id) {
  const e = cvData.experience.find(x => x.id === id);
  if (!e) return;
  e.period = document.getElementById('ex-period').value;
  e.yearsNote = document.getElementById('ex-yearsNote').value;
  e.title = document.getElementById('ex-title').value;
  e.company = document.getElementById('ex-company').value;
  e.contentType = document.getElementById('ex-type').value;
  e.side = document.getElementById('ex-side').value;
  e.dotColor = document.getElementById('ex-dot').value;
  const rawContent = document.getElementById('ex-content').value;
  if (e.contentType === 'text') {
    e.content = rawContent;
  } else {
    e.content = rawContent.split('\n').map(l=>l.trim()).filter(Boolean);
  }
  saveCvData();
  closeModal();
  renderExperienceList();
  showToast('✓ 已儲存');
}

function collectExperience() { return cvData.experience; }

// ─── Education ─────────────────────────────────────────────────────────────
function loadEducationPanel() {
  renderEduAdminList();
  renderCertAdminList();
  const r = cvData.referee || {};
  document.getElementById('referee-name').value = r.name || '';
  document.getElementById('referee-role').value = r.role || '';
}

function renderEduAdminList() {
  document.getElementById('edu-admin-list').innerHTML = (cvData.education||[]).map((e,i) => `
    <div class="flex items-center gap-2 p-3 border border-slate-200 rounded-lg">
      <div class="flex-1 grid grid-cols-3 gap-2">
        <input type="text" value="${e.school||''}" placeholder="學校" onchange="cvData.education[${i}].school=this.value">
        <input type="text" value="${e.degree||''}" placeholder="學位" onchange="cvData.education[${i}].degree=this.value">
        <input type="text" value="${e.year||''}" placeholder="年份 e.g. 2009.06" style="width:auto" onchange="cvData.education[${i}].year=this.value">
      </div>
      <button class="btn btn-danger text-sm flex-shrink-0" onclick="deleteEdu(${i})">刪除</button>
    </div>`).join('');
}

function addEdu() {
  if (!cvData.education) cvData.education = [];
  cvData.education.push({ id:uid(), school:'', degree:'', year:'' });
  renderEduAdminList();
}

function deleteEdu(i) {
  if (!confirm('確定刪除？')) return;
  cvData.education.splice(i,1);
  renderEduAdminList();
}

function renderCertAdminList() {
  document.getElementById('cert-admin-list').innerHTML = (cvData.certifications||[]).map((c,i) => `
    <div class="flex items-center gap-2">
      <input type="text" value="${c.text||''}" placeholder="認證名稱" class="flex-1" onchange="cvData.certifications[${i}].text=this.value">
      <button class="btn btn-danger text-sm flex-shrink-0" onclick="deleteCert(${i})">刪除</button>
    </div>`).join('');
}

function addCert() {
  if (!cvData.certifications) cvData.certifications = [];
  cvData.certifications.push({ id:uid(), text:'' });
  renderCertAdminList();
}

function deleteCert(i) {
  if (!confirm('確定刪除？')) return;
  cvData.certifications.splice(i,1);
  renderCertAdminList();
}

function collectEducation() {
  return (cvData.education || []).map((e,i) => {
    const row = document.getElementById('edu-admin-list').children[i];
    if (row) {
      const inputs = row.querySelectorAll('input');
      return { ...e, school: inputs[0].value, degree: inputs[1].value, year: inputs[2].value };
    }
    return e;
  });
}

function collectCertifications() {
  return (cvData.certifications || []).map((c,i) => {
    const row = document.getElementById('cert-admin-list').children[i];
    if (row) {
      const input = row.querySelector('input');
      return { ...c, text: input ? input.value : c.text };
    }
    return c;
  });
}

// ─── Other ─────────────────────────────────────────────────────────────────
function loadOtherPanel() {
  const f = cvData.footer || {};
  const i = cvData.i18nZh || {};
  document.getElementById('footer-name-val').value = f.name || '';
  document.getElementById('footer-subtitle-val').value = i.footer_subtitle || '';
  document.getElementById('footer-copyright-val').value = i.footer_copyright || '';
  document.getElementById('footer-email-val').value = f.email || '';
  document.getElementById('footer-github-val').value = f.githubUrl || '';
  document.getElementById('footer-linkedin-val').value = f.linkedinUrl || '';
}

function resetAllData() {
  if (!confirm('確定要將所有資料重置為預設值？此動作無法復原。')) return;
  localStorage.removeItem('hogan_cv_data');
  cvData = JSON.parse(JSON.stringify(defaultData));
  initAllPanels();
  showToast('已重置為預設值');
}

// ─── Modal ─────────────────────────────────────────────────────────────────
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─── Init ──────────────────────────────────────────────────────────────────
function initAllPanels() {
  loadHeroPanel();
  loadAboutPanel();
  loadSkillsPanel();
  loadProjectsPanel();
  loadExperiencePanel();
  loadEducationPanel();
  loadOtherPanel();
}

function initAdmin() {
  loadCvData();
  initAllPanels();
}

// Check session on load
if (localStorage.getItem('cv_admin_session') === '1') {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-app').classList.remove('hidden');
  initAdmin();
}

document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
